<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Management | Web Service Tester</title>
    <style>
        :root {
            --background: #eef2f6;
            --panel: #ffffff;
            --panel-head: #f7f8fa;
            --border: #dce3eb;
            --heading: #26384a;
            --text: #546273;
            --primary: #3984c6;
            --primary-dark: #286da9;
            --success: #2f9c62;
            --warning: #e2a54d;
            --danger: #bf4450;
            --shadow: 0 14px 36px rgba(36, 55, 73, 0.13);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", Arial, sans-serif;
            color: var(--text);
            background: linear-gradient(135deg, #e8edf2 0%, #f6f8fb 100%);
        }

        .app {
            width: min(980px, calc(100% - 32px));
            margin: 34px auto;
            padding: 24px;
            border: 1px solid #d4dae1;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.44);
            box-shadow: var(--shadow);
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            gap: 16px;
            margin: 0 0 20px;
        }

        h1 {
            margin: 0 0 5px;
            font-size: 25px;
            font-weight: 600;
            color: var(--heading);
        }

        .subtitle {
            margin: 0;
            font-size: 14px;
        }

        .endpoint {
            padding: 8px 12px;
            border: 1px solid #d4e2f0;
            border-radius: 18px;
            color: #37719f;
            background: #edf6ff;
            font-size: 13px;
        }

        .endpoint code {
            font-family: Consolas, monospace;
        }

        .panel {
            margin-bottom: 18px;
            overflow: hidden;
            border: 1px solid var(--border);
            border-radius: 5px;
            background: var(--panel);
            box-shadow: 0 1px 3px rgba(28, 43, 58, 0.05);
        }

        .panel-heading {
            display: flex;
            justify-content: space-between;
            align-items: center;
            min-height: 54px;
            padding: 0 18px;
            border-bottom: 1px solid var(--border);
            background: var(--panel-head);
        }

        .panel-heading h2 {
            margin: 0;
            color: var(--heading);
            font-size: 18px;
            font-weight: 500;
        }

        .mode {
            display: none;
            padding: 5px 10px;
            border-radius: 13px;
            color: #236943;
            background: #e5f7ec;
            font-size: 12px;
            font-weight: 600;
        }

        .mode.visible {
            display: inline-block;
        }

        .form {
            padding: 22px 24px 12px;
        }

        .field {
            display: grid;
            grid-template-columns: 145px minmax(180px, 440px);
            gap: 16px;
            align-items: center;
            margin-bottom: 16px;
        }

        label {
            color: #475667;
            font-size: 13px;
            font-weight: 600;
        }

        input {
            width: 100%;
            height: 40px;
            padding: 0 12px;
            border: 1px solid #ccd5df;
            border-radius: 4px;
            color: var(--heading);
            font: inherit;
            font-size: 14px;
            transition: border-color 0.15s, box-shadow 0.15s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(57, 132, 198, 0.13);
        }

        input[readonly] {
            background: #f4f6f8;
        }

        .edit-only {
            display: none;
        }

        .form.editing .edit-only {
            display: grid;
        }

        .actions {
            display: flex;
            justify-content: flex-end;
            gap: 9px;
            padding: 0 0 10px;
            max-width: 601px;
        }

        button {
            min-height: 38px;
            padding: 0 16px;
            border: 0;
            border-radius: 4px;
            color: #ffffff;
            font: inherit;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s, filter 0.15s;
        }

        button:hover {
            filter: brightness(0.94);
        }

        button:active {
            transform: translateY(1px);
        }

        button:disabled {
            opacity: 0.65;
            cursor: wait;
        }

        .primary {
            background: var(--primary);
        }

        .primary:hover {
            background: var(--primary-dark);
        }

        .secondary {
            background: var(--warning);
        }

        .ghost {
            color: #5e7082;
            border: 1px solid #d7dfe7;
            background: #ffffff;
        }

        .table-toolbar {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .count {
            color: #708194;
            font-size: 13px;
        }

        .refresh {
            min-height: 34px;
            padding: 0 13px;
            color: #47718e;
            border: 1px solid #d5e0e8;
            background: #ffffff;
            font-size: 13px;
        }

        .message {
            display: none;
            margin: 16px 20px 0;
            padding: 11px 14px;
            border-radius: 4px;
            color: #277044;
            background: #e9f7ee;
            font-size: 14px;
        }

        .message.visible {
            display: block;
        }

        .message.error {
            color: #982e39;
            background: #fdebed;
        }

        .table-wrap {
            padding: 10px 20px 18px;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        th {
            height: 42px;
            color: #5c6b7b;
            border-bottom: 2px solid var(--border);
            font-size: 12px;
            text-align: left;
            text-transform: uppercase;
        }

        td {
            height: 56px;
            padding-right: 14px;
            color: #48586a;
            border-bottom: 1px solid #e8edf2;
        }

        tbody tr:last-child td {
            border-bottom: 0;
        }

        .salary {
            color: #364859;
            font-variant-numeric: tabular-nums;
        }

        .row-action {
            min-height: 34px;
            min-width: 72px;
            padding: 0 14px;
            background: var(--success);
            font-size: 13px;
        }

        .empty {
            height: 82px;
            color: #718395;
            text-align: center;
        }

        @media (max-width: 640px) {
            .app {
                margin: 16px auto;
                padding: 14px;
            }

            .page-header {
                display: block;
            }

            .endpoint {
                display: inline-block;
                margin-top: 14px;
            }

            .field {
                grid-template-columns: 1fr;
                gap: 7px;
            }

            .actions {
                justify-content: stretch;
            }

            .actions button {
                flex: 1;
            }
        }
    </style>
</head>
<body>
<main class="app">
    <header class="page-header">
        <div>
            <h1>Employee Management</h1>
            <p class="subtitle">Web application for testing employee services</p>
        </div>
        <div class="endpoint">Endpoint: <code>/api/employees</code></div>
    </header>

    <section class="panel">
        <div class="panel-heading">
            <h2 id="formTitle">Employee</h2>
            <span id="mode" class="mode">Editing employee</span>
        </div>
        <form id="employeeForm" class="form">
            <div class="field edit-only">
                <label for="employeeId">ID</label>
                <input id="employeeId" type="number" readonly>
            </div>
            <div class="field">
                <label for="employeeName">Name</label>
                <input id="employeeName" type="text" maxlength="100" placeholder="Enter employee name" required>
            </div>
            <div class="field">
                <label for="employeeSalary">Salary</label>
                <input id="employeeSalary" type="number" step="0.01" min="0" placeholder="Enter employee salary" required>
            </div>
            <div class="actions">
                <button id="submitButton" class="primary" type="submit">Add</button>
                <button id="cancelButton" class="ghost" type="button" hidden>Cancel Edit</button>
                <button class="secondary" type="reset">Reset Form</button>
            </div>
        </form>
    </section>

    <section class="panel">
        <div class="panel-heading">
            <h2>List of Employees</h2>
            <div class="table-toolbar">
                <span id="employeeCount" class="count"></span>
                <button id="refreshButton" class="refresh" type="button">Refresh</button>
            </div>
        </div>
        <div id="message" class="message" role="status" aria-live="polite"></div>
        <div class="table-wrap">
            <table>
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Salary</th>
                    <th>Action</th>
                </tr>
                </thead>
                <tbody id="employeesTableBody"></tbody>
            </table>
        </div>
    </section>
</main>

<script>
    const form = document.getElementById('employeeForm');
    const idInput = document.getElementById('employeeId');
    const nameInput = document.getElementById('employeeName');
    const salaryInput = document.getElementById('employeeSalary');
    const submitButton = document.getElementById('submitButton');
    const cancelButton = document.getElementById('cancelButton');
    const refreshButton = document.getElementById('refreshButton');
    const mode = document.getElementById('mode');
    const tbody = document.getElementById('employeesTableBody');
    const count = document.getElementById('employeeCount');
    const salaryFormatter = new Intl.NumberFormat('en-US', {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
    });

    form.addEventListener('submit', saveEmployee);
    form.addEventListener('reset', () => setTimeout(clearEditMode));
    cancelButton.addEventListener('click', () => {
        form.reset();
        clearEditMode();
    });
    refreshButton.addEventListener('click', () => loadEmployees(true));

    async function loadEmployees(showStatus = false) {
        setBusy(refreshButton, true);
        try {
            const response = await fetch('api/employees');
            const employees = await readResponse(response, 'Failed to load employees.');
            renderEmployees(employees);
            if (showStatus) {
                setMessage('Employee list refreshed.');
            }
        } catch (error) {
            setMessage(error.message, true);
        } finally {
            setBusy(refreshButton, false);
        }
    }

    async function saveEmployee(event) {
        event.preventDefault();
        const editing = idInput.value !== '';
        const payload = {
            name: nameInput.value.trim(),
            salary: Number(salaryInput.value)
        };

        if (!payload.name || salaryInput.value === '' || !Number.isFinite(payload.salary) || payload.salary < 0) {
            setMessage('Please enter a name and a valid salary.', true);
            return;
        }
        if (editing) {
            payload.id = Number(idInput.value);
        }

        setBusy(submitButton, true);
        try {
            const response = await fetch('api/employees', {
                method: editing ? 'PUT' : 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            const employee = await readResponse(response, 'Unable to save employee.');
            setMessage(editing
                ? `Employee #${employee.id} updated successfully.`
                : `Employee #${employee.id} added successfully.`);
            form.reset();
            clearEditMode();
            await loadEmployees();
        } catch (error) {
            setMessage(error.message, true);
        } finally {
            setBusy(submitButton, false);
        }
    }

    async function readResponse(response, fallbackMessage) {
        const data = await response.json();
        if (!response.ok) {
            throw new Error(data.error || fallbackMessage);
        }
        return data;
    }

    function renderEmployees(employees) {
        tbody.replaceChildren();
        count.textContent = `${employees.length} employee${employees.length === 1 ? '' : 's'}`;

        if (employees.length === 0) {
            const row = document.createElement('tr');
            const cell = document.createElement('td');
            cell.className = 'empty';
            cell.colSpan = 4;
            cell.textContent = 'No employees have been added yet.';
            row.appendChild(cell);
            tbody.appendChild(row);
            return;
        }

        employees.forEach(employee => {
            const row = document.createElement('tr');
            appendCell(row, employee.id);
            appendCell(row, employee.name);
            appendCell(row, salaryFormatter.format(employee.salary), 'salary');

            const actionCell = document.createElement('td');
            const editButton = document.createElement('button');
            editButton.className = 'row-action';
            editButton.type = 'button';
            editButton.textContent = 'Edit';
            editButton.addEventListener('click', () => editEmployee(employee));
            actionCell.appendChild(editButton);
            row.appendChild(actionCell);
            tbody.appendChild(row);
        });
    }

    function appendCell(row, value, className) {
        const cell = document.createElement('td');
        cell.textContent = value;
        if (className) {
            cell.className = className;
        }
        row.appendChild(cell);
    }

    function editEmployee(employee) {
        idInput.value = employee.id;
        nameInput.value = employee.name;
        salaryInput.value = employee.salary;
        form.classList.add('editing');
        mode.classList.add('visible');
        submitButton.textContent = 'Update';
        submitButton.style.background = 'var(--success)';
        cancelButton.hidden = false;
        nameInput.focus();
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    function clearEditMode() {
        idInput.value = '';
        form.classList.remove('editing');
        mode.classList.remove('visible');
        submitButton.textContent = 'Add';
        submitButton.style.background = '';
        cancelButton.hidden = true;
    }

    function setMessage(text, isError = false) {
        const message = document.getElementById('message');
        message.textContent = text;
        message.className = isError ? 'message visible error' : 'message visible';
    }

    function setBusy(button, busy) {
        button.disabled = busy;
    }

    loadEmployees();
</script>
</body>
</html>
